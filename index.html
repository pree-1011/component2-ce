<!DOCTYPE html>
<html>

<head>

<title>Insider Threat Dashboard</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
text-align:center;
}

header{
background:#1976D2;
color:white;
padding:15px;
}

nav{
background:#e0e0e0;
padding:10px;
}

nav button{
padding:10px;
margin:5px;
border:none;
background:#1976D2;
color:white;
border-radius:5px;
cursor:pointer;
}

.section{
display:none;
padding:20px;
}

.active{
display:block;
}

.card{
background:white;
width:220px;
margin:15px auto;
padding:15px;
border-radius:8px;
box-shadow:0 0 5px gray;
}

table{
margin:auto;
border-collapse:collapse;
width:80%;
background:white;
}

th,td{
border:1px solid gray;
padding:10px;
}

th{
background:#1976D2;
color:white;
}

.suspicious{
color:red;
font-weight:bold;
}

button.action{
background:#4CAF50;
padding:8px;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.disabled{
color:gray;
font-weight:bold;
}

</style>

<script>

function showPage(page){

let sections=document.querySelectorAll(".section");

sections.forEach(sec=>sec.classList.remove("active"));

document.getElementById(page).classList.add("active");

}

function disableUser(rowId){

let row=document.getElementById(rowId);

row.cells[3].innerHTML="Disabled";

row.cells[3].classList.add("disabled");

row.cells[4].innerHTML="Account Blocked";

alert("Admin disabled this user due to suspicious activity");

}

</script>

</head>

<body>

<header>

<h1>Insider Threat Detection System</h1>

</header>

<nav>

<button onclick="showPage('dashboard')">Dashboard</button>

<button onclick="showPage('logs')">Activity Logs</button>

</nav>

<!-- Dashboard -->

<div id="dashboard" class="section active">

<h2>Security Dashboard</h2>

<div class="card">
<h3>Total Users</h3>
<p>75</p>
</div>

<div class="card">
<h3>Active Users</h3>
<p>20</p>
</div>

<div class="card">
<h3>Threat Alerts</h3>
<p>2</p>
</div>

</div>

<!-- Activity Logs -->

<div id="logs" class="section">

<h2>User Activity Logs</h2>

<table>

<tr>
<th>User</th>
<th>Activity</th>
<th>Threat Level</th>
<th>Status</th>
<th>Action</th>
</tr>

<tr id="r1">
<td>John</td>
<td>Login</td>
<td>Low</td>
<td>Active</td>
<td>No Action</td>
</tr>

<tr id="r2">
<td>Alex</td>
<td>Deleted Confidential File</td>
<td class="suspicious">High</td>
<td>Active</td>

<td>
<button class="action"
onclick="disableUser('r2')">
Disable
</button>
</td>

</tr>

<tr id="r3">

<td>Maria</td>

<td>Multiple Failed Logins</td>

<td class="suspicious">Medium</td>

<td>Active</td>

<td>

<button class="action"
onclick="disableUser('r3')">

Disable

</button>

</td>

</tr>

</table>

</div>

</body>

</html>
