<!DOCTYPE html>
<html>

<head>
<title>Insider Threat Detection UI</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
text-align:center;
}

header{
background:#2196F3;
color:white;
padding:15px;
}

nav{
background:#ddd;
padding:10px;
}

nav button{
padding:10px;
margin:5px;
border:none;
background:#2196F3;
color:white;
border-radius:5px;
cursor:pointer;
}

.section{
display:none;
padding:20px;
}

.active{
display:block;
}

.card{
background:white;
width:250px;
margin:15px auto;
padding:15px;
border-radius:8px;
box-shadow:0 0 5px gray;
}

table{
margin:auto;
border-collapse:collapse;
width:70%;
background:white;
}

th,td{
border:1px solid gray;
padding:10px;
}

th{
background:#2196F3;
color:white;
}

button.action{
background:#4CAF50;
padding:10px;
margin:10px;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

<script>

function showPage(page){

let sections=document.querySelectorAll(".section");

sections.forEach(function(sec){
sec.classList.remove("active");
});

document.getElementById(page).classList.add("active");

}

function disableUser(){
alert("User Account Disabled");
}

function resetPassword(){
alert("Password Reset Successful");
}

function report(){
alert("Security Report Generated");
}

</script>

</head>

<body>

<header>

<h1>Insider Threat Detection System</h1>

</header>

<nav>

<button onclick="showPage('dashboard')">Dashboard</button>

<button onclick="showPage('logs')">Activity Logs</button>

<button onclick="showPage('actions')">Mitigation</button>

</nav>

<!-- Dashboard -->

<div id="dashboard" class="section active">

<h2>Dashboard</h2>

<div class="card">
<h3>Total Users</h3>
<p>60</p>
</div>

<div class="card">
<h3>Security Alerts</h3>
<p>3</p>
</div>

<div class="card">
<h3>Failed Logins</h3>
<p>5</p>
</div>

</div>

<!-- Logs -->

<div id="logs" class="section">

<h2>Activity Logs</h2>

<table>

<tr>
<th>User</th>
<th>Action</th>
<th>Status</th>
</tr>

<tr>
<td>John</td>
<td>Login</td>
<td>Normal</td>
</tr>

<tr>
<td>Alex</td>
<td>File Delete</td>
<td>Suspicious</td>
</tr>

<tr>
<td>Maria</td>
<td>Admin Access</td>
<td>Alert</td>
</tr>

</table>

</div>

<!-- Actions -->

<div id="actions" class="section">

<h2>Admin Mitigation Actions</h2>

<button class="action" onclick="disableUser()">Disable User</button>

<button class="action" onclick="resetPassword()">Reset Password</button>

<button class="action" onclick="report()">Generate Report</button>

</div>

</body>

</html>
