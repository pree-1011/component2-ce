<!DOCTYPE html>
<html>

<head>
<title>Insider Threat Detection System</title>

<style>

body{
font-family:Arial;
background:#f3f3f3;
text-align:center;
}

h1{
background:#2f6fdb;
color:white;
padding:15px;
}

table{
margin:auto;
border-collapse:collapse;
width:75%;
background:white;
}

th,td{
border:1px solid gray;
padding:10px;
}

th{
background:#2f6fdb;
color:white;
}

.suspicious{
color:red;
font-weight:bold;
}

button{
padding:8px;
background:#4CAF50;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.disabled{
background:gray;
}

</style>

<script>

function disableUser(rowId){

let row=document.getElementById(rowId);

row.cells[3].innerHTML="Disabled";

row.cells[3].style.color="gray";

row.cells[4].innerHTML="Action Taken";

alert("User disabled due to suspicious activity");

}

</script>

</head>

<body>

<h1>Insider Threat Detection Dashboard</h1>

<h2>User Activity Monitoring</h2>

<table>

<tr>
<th>User</th>
<th>Activity</th>
<th>Threat Level</th>
<th>Status</th>
<th>Action</th>
</tr>

<tr id="row1">
<td>John</td>
<td>Login</td>
<td>Low</td>
<td>Active</td>
<td>No Action</td>
</tr>

<tr id="row2">
<td>Alex</td>
<td>Deleted Important File</td>
<td class="suspicious">High</td>
<td>Active</td>
<td>
<button onclick="disableUser('row2')">
Disable User
</button>
</td>
</tr>

<tr id="row3">
<td>Maria</td>
<td>Multiple Failed Logins</td>
<td class="suspicious">Medium</td>
<td>Active</td>
<td>
<button onclick="disableUser('row3')">
Disable User
</button>
</td>
</tr>

</table>

</body>

</html>
