<!DOCTYPE html>
<html>

<head>
<title>Insider Threat Detection</title>

<style>

body{
font-family:Arial;
background:#f0f0f0;
text-align:center;
}

h1{
background:#4CAF50;
color:white;
padding:15px;
}

.box{
background:white;
width:300px;
margin:20px auto;
padding:15px;
border-radius:8px;
box-shadow:0 0 5px gray;
}

table{
margin:auto;
border-collapse:collapse;
width:60%;
background:white;
}

th, td{
border:1px solid gray;
padding:10px;
}

th{
background:#4CAF50;
color:white;
}

button{
padding:10px;
margin:5px;
background:#4CAF50;
color:white;
border:none;
border-radius:5px;
}

</style>

</head>

<body>

<h1>Insider Threat Detection Dashboard</h1>

<div class="box">
<h3>Total Users</h3>
<p>50</p>
</div>

<div class="box">
<h3>Active Users</h3>
<p>12</p>
</div>

<div class="box">
<h3>Security Alerts</h3>
<p>2</p>
</div>

<h2>User Activity Logs</h2>

<table>

<tr>
<th>User</th>
<th>Action</th>
<th>Status</th>
</tr>

<tr>
<td>John</td>
<td>Login</td>
<td>Normal</td>
</tr>

<tr>
<td>Alex</td>
<td>Delete File</td>
<td>Suspicious</td>
</tr>

<tr>
<td>Maria</td>
<td>Admin Access</td>
<td>Alert</td>
</tr>

</table>

<h2>Admin Actions</h2>

<button>Disable User</button>
<button>Reset Password</button>
<button>Generate Report</button>

</body>

</html>
